version: '3.8'

services:
  transcription:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reelsearch-transcription
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
