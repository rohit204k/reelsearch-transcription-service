steps:
  # Pull all cached stage images (ignore failure on first build)
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-builder:latest || true
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-base:latest || true
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest || true

  # Build all stages with BuildKit inline cache metadata embedded
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env:
      - DOCKER_BUILDKIT=1
    args:
      - -c
      - |
        # builder stage: pip install + whisper model download (~140MB, only reruns if requirements.txt changes)
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-builder:latest \
          --target builder \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-builder:latest \
          . && \
        # base stage: ffmpeg + venv copy (only reruns if builder changes)
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-builder:latest \
          --cache-from us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-base:latest \
          --target base \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-base:latest \
          . && \
        # production stage: just copies server.py + lib/ (fast every time)
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-builder:latest \
          --cache-from us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-base:latest \
          --cache-from us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest \
          .

  # Push all images
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-builder:latest &
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-base:latest &
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest &
        wait

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
