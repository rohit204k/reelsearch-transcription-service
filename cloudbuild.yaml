steps:
  # Pull existing image to use as cache (ignore failure on first build)
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest || true

  # Build with cache
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest
      - .

  # Push
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/reelsearch/transcription-service:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
